project_name: ask
builds:
  - id: ask
    main: ./cmd/ask
    binary: ask
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
brews:
  - name: ask
    repository:
      owner: dl-alexandre
      name: homebrew-tap
    homepage: https://github.com/dl-alexandre/App-StoreKit-CLI
    description: CLI for the App Store Server API
    license: MIT
