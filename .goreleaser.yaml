version: 2

project_name: ask
builds:
  - id: ask
    main: ./cmd/ask
    binary: ask
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.gitCommit={{.Commit}}
      - -X main.buildTime={{.Date}}
    flags:
      - -trimpath
archives:
  - id: default
    format: tar.gz
    name_template: "{{ .ProjectName }}-{{ .Os }}-{{ .Arch }}"
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"
  algorithm: blake3

release:
  github:
    owner: dl-alexandre
    name: App-StoreKit-CLI
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"
brews:
  - name: ask
    repository:
      owner: dl-alexandre
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
      branch: master
      pull_request:
        enabled: false
    commit_author:
      name: goreleaserbot
      email: bot@dl-alexandre.com
    commit_msg_template: "Brew formula update for {{ .ProjectName }} version {{ .Tag }}"
    directory: Formula
    homepage: https://github.com/dl-alexandre/App-StoreKit-CLI
    description: CLI for the App Store Server API
    license: MIT
    skip_upload: "{{ if index .Env \"HOMEBREW_TAP_TOKEN\" }}false{{ else }}true{{ end }}"
    test: |
      system "#{bin}/ask", "version"
    install: |
      bin.install "ask"

flatpak:
  - app_id: net.ddns.dl-alexandre.ASKCLI
    runtime: org.freedesktop.Platform
    runtime_version: "24.08"
    sdk: org.freedesktop.Sdk
    finish_args:
      - --share=network
      - --filesystem=home

srpm:
  enabled: true
  summary: "CLI for the App Store Server API"
  license: MIT
  url: https://github.com/dl-alexandre/App-StoreKit-CLI

scoops:
  - repository:
      owner: dl-alexandre
      name: scoop-bucket
      token: "{{ .Env.SCOOP_BUCKET_TOKEN }}"
      branch: main
      pull_request:
        enabled: false
    commit_author:
      name: goreleaserbot
      email: bot@dl-alexandre.com
    commit_msg_template: "Scoop update for {{ .ProjectName }} version {{ .Tag }}"
    directory: bucket
    description: "CLI for the App Store Server API"
    homepage: "https://github.com/dl-alexandre/App-StoreKit-CLI"
    license: MIT
    skip_upload: "{{ if index .Env \"SCOOP_BUCKET_TOKEN\" }}false{{ else }}true{{ end }}"
